{% extends 'recetas/base.html' %}

{% block title %}Eliminar Receta{% endblock %}

{% block content %}
    <div class="card confirm-dialog">
        <div class="card-header">
            <h1>Eliminar Receta</h1>
        </div>

        <p>Estas seguro de que deseas eliminar <strong>{{ receta.nombre }}</strong>? Esta accion no se puede deshacer.</p>

        <div class="btn-group" style="justify-content: center;">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Si, eliminar</button>
            </form>
            <a href="{% url 'detalle_receta' pk=receta.pk %}" class="btn btn-outline">Cancelar</a>
        </div>
    </div>
{% endblock %}
