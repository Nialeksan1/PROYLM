{% extends 'recetas/base.html' %}

{% block title %}Editar Receta{% endblock %}

{% block content %}
    <div class="card">
        <div class="card-header">
            <h1>Editar Receta</h1>
        </div>

        <div class="form-container">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Guardar cambios</button>
                    <a href="{% url 'detalle_receta' pk=receta.pk %}" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
